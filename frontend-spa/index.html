<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 text-gray-800 font-sans antialiased overflow-hidden">
    <div id="app" class="flex h-screen w-full bg-transparent overflow-hidden">
        <!-- Mobile Sidebar Overlay -->
        <div v-if="isLoggedIn && isSidebarExpanded" @click="isSidebarExpanded = false" class="md:hidden fixed inset-0 z-40 bg-slate-900/60 backdrop-blur-sm transition-opacity"></div>
        
        <aside v-if="isLoggedIn" :class="[isSidebarExpanded ? 'translate-x-0 w-64' : '-translate-x-full md:translate-x-0 md:w-20', 'fixed md:relative z-50 h-full bg-slate-900/95 md:bg-slate-900/80 backdrop-blur-md border-r border-slate-700 flex flex-col transition-all duration-300']">
            <div class="p-4 flex items-center justify-end md:justify-center" :class="{'md:justify-end': isSidebarExpanded}">
                <button @click="isSidebarExpanded = !isSidebarExpanded" class="text-white hover:bg-white/10 p-2 rounded-lg transition-colors hidden md:block">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <button @click="isSidebarExpanded = false" class="text-white hover:bg-white/10 p-2 rounded-lg transition-colors md:hidden">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <nav class="p-4 space-y-2 flex-1 overflow-y-auto" @click="closeSidebarMobile">
                <router-link to="/dashboard" :class="isSidebarExpanded ? 'justify-start px-4' : 'justify-center px-0'" class="flex items-center gap-3 py-3 rounded-xl text-slate-200 hover:bg-white/10 hover:text-white transition-all duration-200 font-medium" active-class="bg-white !text-slate-900 font-bold shadow-lg">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    <span v-if="isSidebarExpanded" class="whitespace-nowrap">Data Barang</span>
                </router-link>
                <router-link to="/kategori" :class="isSidebarExpanded ? 'justify-start px-4' : 'justify-center px-0'" class="flex items-center gap-3 py-3 rounded-xl text-slate-200 hover:bg-white/10 hover:text-white transition-all duration-200 font-medium" active-class="bg-white !text-slate-900 font-bold shadow-lg">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path></svg>
                    <span v-if="isSidebarExpanded" class="whitespace-nowrap">Kategori</span>
                </router-link>
                <router-link to="/supplier" :class="isSidebarExpanded ? 'justify-start px-4' : 'justify-center px-0'" class="flex items-center gap-3 py-3 rounded-xl text-slate-200 hover:bg-white/10 hover:text-white transition-all duration-200 font-medium" active-class="bg-white !text-slate-900 font-bold shadow-lg">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                    <span v-if="isSidebarExpanded" class="whitespace-nowrap">Supplier</span>
                </router-link>
                <router-link to="/histori" :class="isSidebarExpanded ? 'justify-start px-4' : 'justify-center px-0'" class="flex items-center gap-3 py-3 rounded-xl text-slate-200 hover:bg-white/10 hover:text-white transition-all duration-200 font-medium" active-class="bg-white !text-slate-900 font-bold shadow-lg">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span v-if="isSidebarExpanded" class="whitespace-nowrap">Histori</span>
                </router-link>
                <router-link to="/about" :class="isSidebarExpanded ? 'justify-start px-4' : 'justify-center px-0'" class="flex items-center gap-3 py-3 rounded-xl text-slate-200 hover:bg-white/10 hover:text-white transition-all duration-200 font-medium" active-class="bg-white !text-slate-900 font-bold shadow-lg">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span v-if="isSidebarExpanded" class="whitespace-nowrap">About</span>
                </router-link>
            </nav>

            <div class="mt-auto p-4 border-t border-slate-700">
                <button @click="logout" :class="isSidebarExpanded ? 'px-4 justify-center' : 'justify-center px-0'" class="w-full flex items-center gap-3 py-2.5 text-sm font-bold rounded-lg text-white bg-rose-600 hover:bg-rose-700 shadow-md hover:shadow-lg transition-all duration-200">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span v-if="isSidebarExpanded" class="whitespace-nowrap">Logout Akun</span>
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col bg-transparent w-full relative">
            <header class="h-16 bg-white/90 backdrop-blur-md border-b border-gray-200 flex items-center justify-between px-4 md:px-8 shadow-sm z-10 w-full shrink-0">
                <div class="flex items-center gap-3">
                    <button v-if="isLoggedIn" @click="isSidebarExpanded = true" class="md:hidden p-2 -ml-2 text-gray-700 hover:bg-gray-100 rounded-lg transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                    <img src="assets/img/logo.jpg" alt="E-Inventory Logo" class="h-10 md:h-20 w-auto object-contain">
                </div>
            </header>
            <main class="flex-1 p-4 md:p-8 overflow-y-auto w-full">
                <router-view></router-view>
            </main>
        </div>
    </div>

    <script src="assets/js/components/Login.js"></script>
    <script src="assets/js/components/Dashboard.js"></script>
    <script src="assets/js/components/Kategori.js"></script>
    <script src="assets/js/components/Supplier.js"></script>
    <script src="assets/js/components/Histori.js"></script>
    <script src="assets/js/components/LandingPage.js"></script>
    <script src="assets/js/components/About.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
